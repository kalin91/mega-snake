[tool.poetry]
name = "py"
version = "0.1.0"
description = "cli for setting environment for vscode coding"
authors = ["Morales Ortega, Carlos Alberto <carlos.mor.ort@gmail.com>"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.13"
pytest = "8.2.0"
graphql-core = "3.2.5"
colorama = "0.4.6"
directory-tree = "1.0.0"
mypy = "1.13.0"
mypy-extensions = "1.0.0"
poetry = "1.8.4"
pylint = "3.3.1"
types-colorama = "0.4.15.20240311"
virtualenv = "20.27.1"
astroid = "3.3.5"
click = "8.1.7"


[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.mypy]
disable-error-code = ["import-untyped"]