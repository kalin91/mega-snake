type User {
  id: ID!
  username: String!
  email: String!
  profile: Profile
  posts: [Post!]
}

type Profile {
  id: ID!
  bio: String
  avatar: String
  user: User!
}

type Post {
  id: ID!
  title: String!
  content: String!
  author: User!
  comments: [Comment!]
  createdAt: String!
}

type Comment {
  id: ID!
  content: String!
  author: User!
  post: Post!
  createdAt: String!
}